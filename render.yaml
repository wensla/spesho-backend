services:
  - type: web
    name: spesho-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: spesho-db
          property: connectionString
      - key: JWT_ACCESS_TOKEN_EXPIRES
        value: 86400

databases:
  - name: spesho-db
    databaseName: spesho_db
    user: spesho
    plan: free
