name: Keep Backend Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Spesho backend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://spesho-backend.onrender.com/api/health)
          echo "Health check status: $response"
          if [ "$response" != "200" ]; then
            echo "WARNING: Backend returned $response"
            exit 1
          fi
